<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // PWA Service Worker — update-aware registration
    // Forces new SW to activate immediately so users always get the latest build.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');

          // When a new SW is found waiting, tell it to skip waiting
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                // New content available — force activate
                newSW.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

          // When the controlling SW changes, reload to get fresh assets
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        } catch (err) {
          console.warn('SW registration failed:', err);
        }
      });
    }
  </script>
